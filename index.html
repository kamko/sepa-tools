<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEPA Tools - Date Modifier</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border: 1px solid #ddd;
            padding: 32px;
        }

        h1 {
            color: #111;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .drop-zone {
            border: 1px dashed #999;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 20px;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #333;
            background: #f0f0f0;
        }

        .drop-zone.has-file {
            border-color: #2a2;
            border-style: solid;
            background: #f8fff8;
        }

        .drop-zone-text {
            color: #555;
            font-size: 13px;
        }

        .file-name {
            color: #2a2;
            font-weight: 500;
            margin-top: 8px;
            word-break: break-all;
            font-size: 13px;
        }

        .file-input {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 13px;
        }

        input[type="date"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: #333;
        }

        .info-panel {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
            font-size: 13px;
        }

        .info-panel.visible {
            display: block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
        }

        .info-value {
            color: #111;
            font-weight: 500;
        }

        .info-value.old-date {
            color: #a00;
            text-decoration: line-through;
        }

        .info-value.new-date {
            color: #2a2;
        }

        .date-change {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .arrow {
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary {
            background: #111;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #333;
        }

        .btn-primary:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .error {
            background: #fff0f0;
            border: 1px solid #fcc;
            color: #a00;
            padding: 10px 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 data-i18n="title">SEPA Payment Date Modifier</h1>
        <p class="subtitle" data-i18n="subtitle">Update execution dates in pain.001.001.03 XML files</p>

        <div class="drop-zone" id="dropZone">
            <p class="drop-zone-text" data-i18n="dropzone">Drop XML file here or click to select</p>
            <p class="file-name" id="fileName"></p>
            <input type="file" class="file-input" id="fileInput" accept=".xml">
        </div>

        <div class="error" id="errorPanel"></div>

        <div class="form-group">
            <label for="newDate" data-i18n="newDateLabel">New Execution Date</label>
            <input type="date" id="newDate">
        </div>

        <div class="info-panel" id="infoPanel">
            <div class="info-row">
                <span class="info-label" data-i18n="dateChange">Date Change</span>
                <div class="date-change">
                    <span class="info-value old-date" id="oldDate">-</span>
                    <span class="arrow">&#8594;</span>
                    <span class="info-value new-date" id="newDateDisplay">-</span>
                </div>
            </div>
            <div class="info-row">
                <span class="info-label" data-i18n="transactions">Transactions</span>
                <span class="info-value" id="txCount">-</span>
            </div>
            <div class="info-row">
                <span class="info-label" data-i18n="totalAmount">Total Amount</span>
                <span class="info-value" id="totalAmount">-</span>
            </div>
            <div class="info-row">
                <span class="info-label" data-i18n="debtor">Debtor</span>
                <span class="info-value" id="debtorName">-</span>
            </div>
        </div>

        <button class="btn btn-primary" id="downloadBtn" disabled data-i18n="download">
            Download Modified XML
        </button>

        <p class="footer" data-i18n="footer">Client-side only - your data never leaves your browser</p>
    </div>

    <script>
        const translations = {
            en: {
                title: 'SEPA Payment Date Modifier',
                subtitle: 'Update execution dates in pain.001.001.03 XML files',
                dropzone: 'Drop XML file here or click to select',
                newDateLabel: 'New Execution Date',
                dateChange: 'Date Change',
                transactions: 'Transactions',
                totalAmount: 'Total Amount',
                debtor: 'Debtor',
                download: 'Download Modified XML',
                footer: 'Client-side only - your data never leaves your browser',
                errorXml: 'Please select an XML file.',
                errorInvalid: 'Invalid XML file',
                errorSepa: 'Not a valid SEPA payment file (ReqdExctnDt not found).',
                errorRead: 'Error reading file'
            },
            sk: {
                title: 'SEPA - Zmena dátumu platby',
                subtitle: 'Úprava dátumu splatnosti v pain.001.001.03 XML súboroch',
                dropzone: 'Presuňte XML súbor sem alebo kliknite pre výber',
                newDateLabel: 'Nový dátum splatnosti',
                dateChange: 'Zmena dátumu',
                transactions: 'Počet transakcií',
                totalAmount: 'Celková suma',
                debtor: 'Platca',
                download: 'Stiahnuť upravený XML',
                footer: 'Spracovanie prebieha lokálne - dáta neopúšťajú prehliadač',
                errorXml: 'Vyberte prosím XML súbor.',
                errorInvalid: 'Neplatný XML súbor',
                errorSepa: 'Neplatný SEPA platobný súbor (ReqdExctnDt sa nenašiel).',
                errorRead: 'Chyba pri čítaní súboru'
            }
        };

        const lang = navigator.language.startsWith('sk') ? 'sk' : 'en';
        const t = translations[lang];

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key]) el.textContent = t[key];
        });
        document.documentElement.lang = lang;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const newDateInput = document.getElementById('newDate');
        const infoPanel = document.getElementById('infoPanel');
        const errorPanel = document.getElementById('errorPanel');
        const downloadBtn = document.getElementById('downloadBtn');
        const oldDateEl = document.getElementById('oldDate');
        const newDateDisplayEl = document.getElementById('newDateDisplay');
        const txCountEl = document.getElementById('txCount');
        const totalAmountEl = document.getElementById('totalAmount');
        const debtorNameEl = document.getElementById('debtorName');

        let xmlDoc = null;
        let originalFileName = '';
        let originalDate = '';

        // Set default date to today
        const today = new Date().toISOString().split('T')[0];
        newDateInput.value = today;

        // Drop zone events
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        newDateInput.addEventListener('change', updatePreview);

        function showError(message) {
            errorPanel.textContent = message;
            errorPanel.classList.add('visible');
            infoPanel.classList.remove('visible');
            downloadBtn.disabled = true;
        }

        function hideError() {
            errorPanel.classList.remove('visible');
        }

        function handleFile(file) {
            hideError();

            if (!file.name.toLowerCase().endsWith('.xml')) {
                showError(t.errorXml);
                return;
            }

            originalFileName = file.name;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parser = new DOMParser();
                    xmlDoc = parser.parseFromString(e.target.result, 'application/xml');

                    // Check for parse errors
                    const parseError = xmlDoc.querySelector('parsererror');
                    if (parseError) {
                        showError(t.errorInvalid + ': ' + parseError.textContent.substring(0, 100));
                        xmlDoc = null;
                        return;
                    }

                    // Find ReqdExctnDt to verify it's a SEPA file
                    const reqdExctnDt = xmlDoc.getElementsByTagNameNS('*', 'ReqdExctnDt')[0];
                    if (!reqdExctnDt) {
                        showError(t.errorSepa);
                        xmlDoc = null;
                        return;
                    }

                    originalDate = reqdExctnDt.textContent;

                    // Update UI
                    fileName.textContent = file.name;
                    dropZone.classList.add('has-file');

                    updatePreview();
                } catch (err) {
                    showError(t.errorRead + ': ' + err.message);
                    xmlDoc = null;
                }
            };
            reader.onerror = () => {
                showError(t.errorRead);
            };
            reader.readAsText(file);
        }

        function updatePreview() {
            if (!xmlDoc) return;

            const newDate = newDateInput.value;

            // Get payment info
            const nbOfTxs = xmlDoc.getElementsByTagNameNS('*', 'NbOfTxs')[0];
            const ctrlSum = xmlDoc.getElementsByTagNameNS('*', 'CtrlSum')[0];
            const dbtrName = xmlDoc.getElementsByTagNameNS('*', 'Dbtr')[0]?.getElementsByTagNameNS('*', 'Nm')[0];

            oldDateEl.textContent = originalDate;
            newDateDisplayEl.textContent = newDate;
            txCountEl.textContent = nbOfTxs ? nbOfTxs.textContent : '-';
            totalAmountEl.textContent = ctrlSum ? ctrlSum.textContent + ' EUR' : '-';
            debtorNameEl.textContent = dbtrName ? dbtrName.textContent.trim() : '-';

            infoPanel.classList.add('visible');
            downloadBtn.disabled = false;
        }

        downloadBtn.addEventListener('click', () => {
            if (!xmlDoc) return;

            const newDate = newDateInput.value;
            const now = new Date().toISOString().split('.')[0]; // Format: 2026-03-12T10:30:45

            // Update all ReqdExctnDt elements
            const reqdExctnDtList = xmlDoc.getElementsByTagNameNS('*', 'ReqdExctnDt');
            for (let i = 0; i < reqdExctnDtList.length; i++) {
                reqdExctnDtList[i].textContent = newDate;
            }

            // Update CreDtTm to current datetime
            const creDtTmList = xmlDoc.getElementsByTagNameNS('*', 'CreDtTm');
            for (let i = 0; i < creDtTmList.length; i++) {
                creDtTmList[i].textContent = now;
            }

            // Serialize back to string
            const serializer = new XMLSerializer();
            let xmlString = serializer.serializeToString(xmlDoc);

            // Ensure proper XML declaration
            if (!xmlString.startsWith('<?xml')) {
                xmlString = '<?xml version="1.0" encoding="UTF-8"?>\n' + xmlString;
            }

            // Create download
            const blob = new Blob([xmlString], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;

            // Generate new filename
            const baseName = originalFileName.replace(/\.xml$/i, '');
            a.download = `${baseName}_${newDate}.xml`;

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
